baseURL: "https://hasban.site/"
title: "Hasban fardani"
paginate: 5
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
enableEmoji: true
buildDrafts: false
buildFuture: false
buildExpired: false
mainSections: 
  - posts

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

copyright: "**[Hasban Fardani](https://hasban.site)**"

minify:
  disableXML: true
  minifyOutput: true

googleAnalytics: G-XMMKCMKZKP
params:
  mainSections: 
    - posts
    - 
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: "Hasban Fardani"
  description: "Hasban Fardani personal site"
  keywords: [Blog, Portfolio, PaperMod, Hugo, Software Engineer, Web Developer, Fullstack Developer, Programmer]
  images: ["/hfcode.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowPostNavLinks: true
  ShowCodeCopyButtons: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    favicon: "/hfcode192x192.png"

  label:
    text: "Hasban"
    iconHeight: 35

  # home-info mode
  homeInfoParams:
    Title: "Hasban Fardani"
    Content: > 
      Fullstack Developer | Software Engineer | Mobile Developer 
      
      - Currently study at SMKN 11 Bandung

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/hasban-fardani/"
    - name: github
      url: "https://github.com/Hasban-Fardani/"
    - name: instagram
      url: "https://www.instagram.com/hasban_fardani/"

  cover:
    hidden: false 
    hiddenInHomePage: true 
    hiddenInList: false 
    hiddenInSingle: false 

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: archievement
      name: Archievement
      url: /archievement/
      weight: 30
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai