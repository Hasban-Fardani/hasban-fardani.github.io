params:
  profileMode:
    enabled: true
    title: "Hasban Fardani" 
    subtitle: >
      Create high quality, fast and user-focused applications with simple and interactive UI/UX design. I also have some organizational and communication skills.
    imageUrl: "" # optional
    imageTitle: "My Profile" # optional
    imageWidth: 120 # custom size
    imageHeight: 120 # custom size
    buttons:
      - name: CV
        url: "/https://www.cakeresume.com/s--phB-1nT8yiMEHymR9EL-vw--/hasban-fardani"
      - name: Projects
        url: "/projects"
  mainSections: 
    - posts
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: "Hasban Fardani"
  description: "Hasban Fardani personal site"
  keywords: [Blog, Portfolio, PaperMod, Hugo, Software Engineer, Web Developer, Fullstack Developer, Programmer, IT Enthusiast]
  images: ["/hfcode.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark # dark, light
  disableThemeToggle: false

  ShowPostNavLinks: true
  ShowCodeCopyButtons: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    favicon: "/hfcode192x192.png"

  label:
    text: "Hasban"
    iconHeight: 35

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/hasban-fardani/"
    - name: github
      url: "https://github.com/Hasban-Fardani/"
    - name: instagram
      url: "https://www.instagram.com/hasban_fardani/"

  cover:
    hidden: false 
    hiddenInHomePage: true 
    hiddenInList: false 
    hiddenInSingle: false 

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

